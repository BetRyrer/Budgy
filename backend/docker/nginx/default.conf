# Nginx sert de point d'entrée HTTP pour l'API Symfony : il délègue
# l'exécution des fichiers .php au service PHP-FPM "backend" via FastCGI,
# et sert les éventuels fichiers statiques directement.
server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    client_max_body_size 20m;

    location / {
        # Toutes les requêtes passent par le front controller Symfony
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /dev/stderr;
    access_log /dev/stdout;
}
