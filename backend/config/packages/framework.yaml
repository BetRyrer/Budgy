framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    # Enables session support in the request, if none is set, session cookies are not set
    session:
        enabled: false

    serializer:
        enable_attributes: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
