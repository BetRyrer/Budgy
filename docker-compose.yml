services:
  # --- Base de données PostgreSQL ---
  database:
    image: postgres:16-alpine
    container_name: budgy_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Exposé sur l'hôte pour pouvoir se connecter avec un client SQL en dev
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Volume nommé : les données survivent à un `docker compose down`
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - budgy

  # --- Backend Symfony (PHP-FPM) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgy_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGIN: '^http://localhost:(${FRONTEND_PORT}|[0-9]+)$$'
    volumes:
      # Bind mount du code source : les changements PHP sont pris en compte sans rebuild
      - ./backend:/var/www/html
      # On garde vendor/ et var/ dans des volumes anonymes pour ne pas écraser
      # ce qui a été installé pendant le `docker build` (composer install)
      - backend_vendor:/var/www/html/vendor
      - backend_var:/var/www/html/var
    networks:
      - budgy

  # --- Nginx : sert le backend Symfony (reverse proxy vers PHP-FPM) ---
  nginx:
    image: nginx:1.27-alpine
    container_name: budgy_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      # Nginx a besoin d'accéder à public/ pour servir index.php et les assets statiques
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - budgy

  # --- Frontend React (Vite dev server) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: budgy_frontend
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      # Bind mount pour le hot-reload : les changements de code sont reflétés instantanément
      - ./frontend:/app
      # node_modules reste dans un volume anonyme pour ne pas être écrasé par le bind mount ci-dessus
      - frontend_node_modules:/app/node_modules
    networks:
      - budgy

networks:
  budgy:
    driver: bridge

volumes:
  db_data:
  backend_vendor:
  backend_var:
  frontend_node_modules:
